<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BackQuant 回测工作台</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__BACKTRADER_API__ = 'http://127.0.0.1:8060/api';
      window.__showBootError = function (message) {
        var box = document.getElementById('boot-error');
        if (!box) {
          box = document.createElement('pre');
          box.id = 'boot-error';
          box.style.cssText = 'margin:16px;padding:14px;border:1px solid #f1b6ae;border-radius:6px;color:#9f2a1f;background:#fff4f2;white-space:pre-wrap;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;';
          document.body.prepend(box);
        }
        box.textContent = '前端启动失败：\\n' + message;
      };
      window.addEventListener('error', function (event) {
        window.__showBootError(event.message || String(event.error || event));
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.__showBootError((event.reason && event.reason.message) || String(event.reason || event));
      });
    </script>
    <script src="/vendor/react.production.min.js"></script>
    <script src="/vendor/react-dom.production.min.js"></script>
    <script src="/vendor/htm.umd.js"></script>
    <script src="/vendor/echarts.min.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
